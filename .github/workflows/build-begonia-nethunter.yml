name: Build Begonia NetHunter Kernel

on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 'Kernel source repository URL'
        required: true
        default: 'https://github.com/xiaomi-begonia-dev/android_kernel_xiaomi_mt6785'
      kernel_branch:
        description: 'Kernel source branch'
        required: true
        default: 'fourteen'
      defconfig:
        description: 'Kernel defconfig name'
        required: true
        default: 'begonia_user_defconfig'

env:
  OUT_DIR: ${{ github.workspace }}/out
  KERNEL_NAME: begonia-nethunter

jobs:
  build:
    name: Build NetHunter Kernel for begonia
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bc bison flex \
            libssl-dev libncurses5-dev libfl-dev \
            ccache curl wget git zip unzip \
            device-tree-compiler python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone kernel source
        run: |
          git clone --recursive --depth=1 -j$(nproc) \
            --branch ${{ github.event.inputs.kernel_branch }} \
            ${{ github.event.inputs.kernel_repo }} \
            $KERNEL_NAME

      - name: Clone NetHunter kernel builder & apply patches
        run: |
          git clone --depth=1 \
            https://gitlab.com/kalilinux/nethunter/build-scripts/kali-nethunter-kernel-builder.git \
            nethunter-builder

          cd $KERNEL_NAME

          PATCH_DIR=${{ github.workspace }}/nethunter-builder/patches/4.14
          for patch in "$PATCH_DIR"/*.patch; do
            echo "Applying patch: $(basename $patch)"
            patch -p1 --ignore-whitespace --forward < "$patch" 2>&1 || echo "Patch $(basename $patch) skipped or already applied"
          done

      - name: Add MT7603U USB ID to in-kernel mt7601u driver
        run: |
          cd $KERNEL_NAME
          echo "Adding 0e8d:7603 to mt7601u device table..."
          sed -i '/{ USB_DEVICE(0x0e8d, 0x760b) },/a\\t{ USB_DEVICE(0x0e8d, 0x7603) },' \
            drivers/net/wireless/mediatek/mt7601u/usb.c
          grep -n "0x7603\|0x760b" drivers/net/wireless/mediatek/mt7601u/usb.c

      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 \
            https://github.com/Wahid7852/AnyKernel AnyKernel3

      - name: Get toolchain (crDroid Clang r547379)
        run: |
          git clone --depth=1 \
            --branch 15.0 \
            https://gitlab.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-r547379 \
            clang-crDroid

      - name: Create NetHunter defconfig
        run: |
          cd $KERNEL_NAME
          cp arch/arm64/configs/${{ github.event.inputs.defconfig }} arch/arm64/configs/nethunter_defconfig
          cat ${{ github.workspace }}/nethunter-config-additions >> arch/arm64/configs/nethunter_defconfig

      - name: Generate kernel config
        run: |
          export PATH="${{ github.workspace }}/clang-crDroid/bin:$PATH"
          mkdir -p ${{ env.OUT_DIR }}

          make -C $KERNEL_NAME O=${{ env.OUT_DIR }} \
            ARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=ld.lld \
            LLVM=1 LLVM_IAS=1 \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            nethunter_defconfig

      - name: Build kernel
        run: |
          export PATH="${{ github.workspace }}/clang-crDroid/bin:$PATH"

          make -C $KERNEL_NAME O=${{ env.OUT_DIR }} \
            ARCH=arm64 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LD=ld.lld \
            LLVM=1 LLVM_IAS=1 \
            AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            -j$(nproc)

      - name: Clone MT7603U vendor driver
        run: |
          git clone --depth=1 --branch pub-test-v20220304 \
            https://github.com/ChalesYu/buildroot_platform_hardware_wifi_mtk_drivers_mt7603.git \
            mt7603u-driver

      - name: Build MT7603U vendor driver
        run: |
          cd mt7603u-driver
          # Use Makefile targets which set required env vars (RT28xx_DIR, CHIPSET)
          make build_tools
          echo "Host tools built, now building kernel module..."
          # Build the kernel module against the built kernel
          make LINUX KSRC=${{ env.OUT_DIR }} \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            -j$(nproc) 2>&1 || echo "WARNING: mt7603u vendor driver build failed, continuing anyway"

      - name: Package AnyKernel3
        run: |
          if [ -f "${{ env.OUT_DIR }}/arch/arm64/boot/Image.gz" ]; then
            cp "${{ env.OUT_DIR }}/arch/arm64/boot/Image.gz" AnyKernel3/
            echo "Copied Image.gz"
          else
            echo "Image.gz not found!"
            ls -la ${{ env.OUT_DIR }}/arch/arm64/boot/ || true
          fi

          if [ -f "${{ env.OUT_DIR }}/arch/arm64/boot/dtbo.img" ]; then
            cp "${{ env.OUT_DIR }}/arch/arm64/boot/dtbo.img" AnyKernel3/
            echo "Copied dtbo.img"
          fi

          # Include MT7603U vendor driver module and firmware if built
          if [ -f "mt7603u-driver/os/linux/mt7603usta.ko" ]; then
            echo "Including MT7603U vendor driver module..."
            mkdir -p AnyKernel3/modules
            cp mt7603u-driver/os/linux/mt7603usta.ko AnyKernel3/modules/
            # Copy firmware files
            if [ -d "mt7603u-driver/mt7603_firmware" ]; then
              cp mt7603u-driver/mt7603_firmware/* AnyKernel3/modules/ 2>/dev/null || true
            fi
            # Create install script line by line (avoid heredoc in YAML)
            echo '#!/system/bin/sh' > AnyKernel3/modules/install-mt7603u.sh
            echo 'MODDIR="$(dirname "$(readlink -f "$0")")"' >> AnyKernel3/modules/install-mt7603u.sh
            echo '' >> AnyKernel3/modules/install-mt7603u.sh
            echo 'mount -o remount,rw / 2>/dev/null || true' >> AnyKernel3/modules/install-mt7603u.sh
            echo 'mkdir -p /lib/firmware 2>/dev/null || true' >> AnyKernel3/modules/install-mt7603u.sh
            echo 'cp -f "$MODDIR"/MT7603USTA.dat /lib/firmware/ 2>/dev/null || true' >> AnyKernel3/modules/install-mt7603u.sh
            echo 'cp -f "$MODDIR"/*.bin /lib/firmware/ 2>/dev/null || true' >> AnyKernel3/modules/install-mt7603u.sh
            echo '' >> AnyKernel3/modules/install-mt7603u.sh
            echo 'insmod "$MODDIR"/mt7603usta.ko' >> AnyKernel3/modules/install-mt7603u.sh
            echo '' >> AnyKernel3/modules/install-mt7603u.sh
            echo 'if lsmod | grep -q mt7603; then' >> AnyKernel3/modules/install-mt7603u.sh
            echo '  echo "MT7603U driver loaded successfully"' >> AnyKernel3/modules/install-mt7603u.sh
            echo '  echo "Interface name:"' >> AnyKernel3/modules/install-mt7603u.sh
            echo '  iw dev 2>/dev/null || ip link show 2>/dev/null | grep -E "^[0-9]+: ra" || true' >> AnyKernel3/modules/install-mt7603u.sh
            echo 'else' >> AnyKernel3/modules/install-mt7603u.sh
            echo '  echo "Failed to load MT7603U driver"' >> AnyKernel3/modules/install-mt7603u.sh
            echo 'fi' >> AnyKernel3/modules/install-mt7603u.sh
            chmod +x AnyKernel3/modules/install-mt7603u.sh
          else
            echo "MT7603U vendor module not found, kernel only"
          fi

          cd AnyKernel3
          sed -i 's/kernel.string=.*/kernel.string=NetHunter Kernel for begonia by opencode/' anykernel.sh
          sed -i 's/device.name1=.*/device.name1=begonia/' anykernel.sh
          sed -i 's/device.name2=.*/device.name2=begoniain/' anykernel.sh
          zip -r9 ../begonia-NetHunter-Kernel-A14.zip * \
            -x ".git" "README.md" "*placeholder"

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: begonia-NetHunter-Kernel-A14
          path: begonia-NetHunter-Kernel-A14.zip
          if-no-files-found: error
